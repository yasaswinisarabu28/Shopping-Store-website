<html>
    <head>
        <title>product details</title>
        <link  rel="stylesheet" href="product.css">
    </head>
    <body>
        <div id="product">
        </div>
    <template id="productTemplate">
        <div class="product-card">
            <img class="image">
            <div class="product-info">
            <h1 class="title"></h1>
            <p class="description"></p>
            <p class="price"></p>
            <div class="top">
            <p class="brand"></p>
            <p class="category"></p>
            <p class="rating"></p>
            <p class="stock"></p>
            <p class="discount"></p>
            </div>
            <div class="bottom">
            <p class="sku"></p>
            <p class="weight"></p>
            <p class="warranty"></p>
            <p class="shipping"></p>
            <p class="availability"></p>
            <p class="returnPolicy"></p>
            </div>
            </div>
        </div>
    </template>

    <script src="product.js"></script>

</html>
